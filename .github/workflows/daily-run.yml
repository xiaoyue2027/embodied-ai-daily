name: Embodied AI Daily

on:
  # 1. 定时触发：北京时间每天 9:00（UTC 1:00）
  schedule:
    - cron: "0 1 * * *"

  # 2. 手动触发（workflow_dispatch），可指定日期
  workflow_dispatch:
    inputs:
      date:
        description: "日报日期 (YYYY-MM-DD)，留空用今天"
        required: false
        default: ""
      push:
        description: "推送渠道（wechat_work / 空=不推送）"
        required: false
        default: "wechat_work"
      push_pdf:
        description: "PDF 推送方式：file=企业微信文件消息（IP 白名单设为 * 时用）/ link=发 GitHub Release 链接"
        required: false
        default: "file"

  # 3. 允许从其他 workflow 触发
  workflow_call:

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装系统依赖（WeasyPrint 字体）
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 fonts-noto-color-emoji

      - name: 📦 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 🔍 自检：simplify 单元测试
        run: |
          python scripts/test_simplify.py

      - name: 🔍 抓取当日信息（Tavily）
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          echo "🔑 TAVILY_API_KEY 长度: ${#TAVILY_API_KEY}"
          python scripts/fetch_websearch.py --output /tmp/websearch_today.json 2>&1 | tail -25
          echo "📊 抓取完成，文件大小："
          wc -c /tmp/websearch_today.json
          if [ -s /tmp/websearch_today.json ]; then
            echo "📊 抓取条数: $(python3 -c "import json; print(len(json.load(open('/tmp/websearch_today.json'))))")"
          else
            echo "⚠️ 文件为空！抓取失败"
          fi

      - name: 📰 生成日报 + PDF
        env:
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
          DAILY_REPORTS_DIR: ${{ github.workspace }}/daily_reports
        run: |
          mkdir -p "$DAILY_REPORTS_DIR"
          DATE="${DATE:-$(date +%Y-%m-%d)}"
          echo "DATE=$DATE" >> $GITHUB_ENV
          PUSH_FLAG=""
          PUSH_PDF_FLAG=""
          if [ -n "$WECHAT_WORK_WEBHOOK" ]; then
            PUSH_FLAG="--push wechat_work"
            echo "🔑 Webhook 已配置（长度: ${#WECHAT_WORK_WEBHOOK} 字符, 推PDF: ${{ inputs.push_pdf }}）"
          else
            echo "⚠️ WECHAT_WORK_WEBHOOK 未配置"
          fi
          python scripts/run_daily.py \
            --input /tmp/websearch_today.json \
            --no-browser \
            --date "$DATE" \
            --pdf \
            $PUSH_FLAG
          echo "✓ 日报 + PDF 生成完成"
          echo "📁 生成的文件："
          ls -la "$DAILY_REPORTS_DIR"

      - name: 📦 上传 PDF 到 GitHub Release
        if: ${{ inputs.push_pdf == 'link' && env.DATE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 创建/更新 Release: daily-${{ env.DATE }}"
          # 用 gh CLI 创建 release 并上传 PDF
          gh release create "daily-${{ env.DATE }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "具身智能日报 ${{ env.DATE }}" \
            --notes "自动发布的日报 PDF" \
            --target main \
            "daily_reports/embodied_ai_${{ env.DATE }}.pdf" \
            2>&1 || gh release upload "daily-${{ env.DATE }}" \
              --repo "$GITHUB_REPOSITORY" \
              "daily_reports/embodied_ai_${{ env.DATE }}.pdf" \
              2>&1
          echo "📎 Release URL: https://github.com/$GITHUB_REPOSITORY/releases/download/daily-${{ env.DATE }}/embodied_ai_${{ env.DATE }}.pdf"

      - name: 📤 推送 PDF 链接到企业微信
        if: ${{ inputs.push_pdf == 'link' && inputs.push == 'wechat_work' }}
        env:
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
        run: |
          PDF_URL="https://github.com/${{ github.repository }}/releases/download/daily-${{ env.DATE }}/embodied_ai_${{ env.DATE }}.pdf"
          PAYLOAD=$(python3 scripts/push_pdf_link.py "$PDF_URL" "${{ env.DATE }}")
          curl -s -X POST "$WECHAT_WORK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          echo "✓ PDF 链接已推送"

      - name: 📎 直接推 PDF 文件到企业微信
        if: ${{ inputs.push_pdf == 'file' }}
        env:
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
        run: |
          python scripts/run_daily.py \
            --input /tmp/websearch_today.json \
            --no-browser \
            --date "${{ env.DATE }}" \
            --push wechat_work --push-pdf 2>&1 | tail -10
          echo "⚠️ 注意：GitHub Actions IP 每次都变，可能被企业微信拦截"

      - name: 📤 上传日报为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: embodied-ai-daily-${{ env.DATE }}
          path: |
            daily_reports/embodied_ai_${{ env.DATE }}.md
            daily_reports/embodied_ai_${{ env.DATE }}.pdf
            daily_reports/monthly/
          retention-days: 90
          if-no-files-found: warn

      - name: 💾 提交日报到仓库（私有仓库才开启）
        if: ${{ false }}  # 公开仓库不自动 commit 日报（避免商业内容公开）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_reports/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无新日报，跳过提交"
          else
            git commit -m "chore: 自动日报 ${{ env.DATE }}" || true
            git push || echo "推送失败（可能是权限问题）"
          fi

      - name: ✅ 总结
        if: always()
        run: |
          echo "============================================"
          echo "📅 日报: ${{ env.DATE }}"
          echo "📁 Markdown: daily_reports/embodied_ai_${{ env.DATE }}.md"
          echo "📄 PDF: daily_reports/embodied_ai_${{ env.DATE }}.pdf"
          echo "🔗 Artifact: 见上方上传结果"
          echo "============================================"
